<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather</title>
  <link rel="stylesheet" href="weather.css">
</head>
<body>
  <div class="main-card">
    <div class="search-elements">
      <input type="text" placeholder="Search" class="search-bar">
      <button class="search-btn"><img src="assets/search-svgrepo-com.svg" alt="" class="search-btn-img"></button>
    </div>

    <div class="weather-img">
      <img src="assets/sun-svgrepo-com.svg" alt="">
    </div>

    <div class="temprature">
      22°c
    </div>

    <div class="city">
      Bhopal, India
    </div>

    <div class="additional-details">
      
      <div class="humidity">
        <img src="assets/humidity-svgrepo-com.svg" alt="" class="humidity-img">
        <p>humidity</p>
      </div>
      
      <div class="windspeed">
        <img src="assets/weather-wind-svgrepo-com.svg" alt="" class="wind-speed-img">
        <p>wind speed</p>
      </div>
    </div>
    
  </div>

  <script src="weather.js"></script>
  </body>
</html>
