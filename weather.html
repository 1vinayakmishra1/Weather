<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather</title>
  <link rel="stylesheet" href="weather.css">
</head>
<body>
  <div class="main-card">
    <div class="search-elements">
      <input type="text" placeholder="Search" class="search-bar js-search-bar">
      <button class="search-btn js-search-btn"><img src="assets/search-svgrepo-com.svg" alt="" class="search-btn-img"></button>
    </div>

    <div class="weather-img js-weather-img">
    </div>

    <div class="temprature js-temprature">
    </div>
    <div class="weather-description js-weather-description">
    </div>

    <div class="city js-city">
    </div>

    <div class="additional-details">
      
      <div class="humidity">
        <div class="js-humidity"></div>
        <p class="humid js-humid"></p>
      </div>
      
      <div class="windspeed">
        <div class="js-windspeed"></div>
        <p class="wind-speed js-wind-speed"></p>
      </div>
    </div>
    
  </div>

  <script src="config.js"></script>
  <script src="weather.js"></script>
  </body>
</html>
